name: Build firmware (CarReceiver ESP32)

on:
  push:
    branches: [main]
    paths:
      - 'CarReceiver.ino'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 + Bluepad32 board package
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/ricardoquesada/esp32-arduino-lib-builder/master/bluepad32_files/package_esp32_bluepad32_index.json
          arduino-cli core update-index
          # Instala o core oficial + o Bluepad32 embutido (versão mais recente, compatível com 3.x)
          arduino-cli core install esp32:esp32@3.0.0
          arduino-cli core install esp32:esp32-bluepad32    # <-- este é o segredo!
      
      - name: Debug Show installed cores and boards
        run: |
          arduino-cli core list
          arduino-cli board listall | grep -i esp32 || echo "Nenhum board ESP32 listado"
          arduino-cli board listall | grep -i bluepad || echo "Bluepad não apareceu"

      - name: Show environment (debug)
        run: |
          arduino-cli core list
          arduino-cli lib list

      - name: Extract firmware version
        id: version
        run: |
          VERSION=$(grep -Po '(?<=#define FIRMWARE_VERSION ")[^"]*' CarReceiver.ino | head -n1)
          [ -z "$VERSION" ] && { echo "ERRO: FIRMWARE_VERSION não encontrado"; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --export-binaries \
            --output-dir build \
            .
          BIN=$(find build -name "*.bin" | head -n1)
          [ -z "$BIN" ] && { echo "Nenhum .bin gerado"; exit 1; }
          cp "$BIN" build/CarReceiver.bin

      - name: Create Git Tag (if needed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch --tags
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create/Update GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          files: build/CarReceiver.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}