name: Build firmware (CarReceiver ESP32)

on:
  push:
    branches: [main]
    paths:
      - 'CarReceiver.ino'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install latest ESP32 core (3.x)
        run: |
          arduino-cli config init
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Bluepad32 library
        run: |
          mkdir -p libraries
          rm -rf libraries/Bluepad32
          git clone --depth 1 https://github.com/ricardoquesada/bluepad32-arduino.git libraries/Bluepad32
          echo "Bluepad32.h location:"
          find libraries/Bluepad32 -name "Bluepad32.h" || echo "Not found!"

      - name: Show environment (debug)
        run: |
          arduino-cli core list
          arduino-cli lib list

      - name: Extract firmware version
        id: version
        run: |
          VERSION=$(grep -Po '(?<=#define FIRMWARE_VERSION ")[^"]*' CarReceiver.ino | head -n1)
          [ -z "$VERSION" ] && { echo "ERRO: FIRMWARE_VERSION não encontrado"; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --export-binaries \
            --output-dir build \
            .
          BIN=$(find build -name "*.bin" | head -n1)
          [ -z "$BIN" ] && { echo "Nenhum .bin gerado"; exit 1; }
          cp "$BIN" build/CarReceiver.bin

      - name: Create Git Tag (if needed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch --tags
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create/Update GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          files: build/CarReceiver.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}