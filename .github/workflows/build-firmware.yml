name: Build firmware (CarReceiver ESP32 + Bluepad32)

on:
  push:
    branches: [ main ]
    paths:
      - 'CarReceiver.ino'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 + Bluepad32 cores
        run: |
          arduino-cli config init

          # URLs oficiais (ESP32) + Bluepad32 (ESP32+Bluepad32)
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/ricardoquesada/esp32-arduino-lib-builder/master/bluepad32_files/package_esp32_bluepad32_index.json

          arduino-cli core update-index

          # Instala os dois pacotes (o Bluepad32 depende do ESP32)
          arduino-cli core install esp32:esp32
          arduino-cli core install esp32_bluepad32:esp32

      - name: Extract firmware version
        id: version
        run: |
          VERSION=$(grep -Po '(?<=#define FIRMWARE_VERSION ")[^"]*' CarReceiver.ino | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "ERRO: não achei #define FIRMWARE_VERSION em CarReceiver.ino"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Firmware version: $VERSION"

      - name: Pick FQBN (ESP32 Dev Module - Bluepad32)
        id: fqbn
        run: |
          # Tenta achar automaticamente a FQBN do "ESP32 Dev Module" do pacote bluepad32
          FQBN=$(arduino-cli board listall --format json \
            | jq -r '.boards[]
              | select(.fqbn | test("esp32_bluepad32"))
              | select(.name | test("ESP32 Dev Module"; "i"))
              | .fqbn' | head -n 1)

          # Fallback caso o nome venha diferente
          if [ -z "$FQBN" ] || [ "$FQBN" = "null" ]; then
            FQBN="esp32_bluepad32:esp32:esp32"
          fi

          echo "fqbn=$FQBN" >> $GITHUB_OUTPUT
          echo "Usando FQBN: $FQBN"

      - name: Create Git Tag (if needed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch --tags

          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn "${{ steps.fqbn.outputs.fqbn }}" \
            --export-binaries \
            --output-dir build \
            .

          echo "Arquivos gerados:"
          ls -lah build

          # Escolhe o BIN do APP (evita bootloader/partitions)
          # Geralmente o maior .bin é o firmware do sketch.
          BIN=$(ls -S build/*.bin | head -n 1)
          echo "BIN escolhido: $BIN"
          cp "$BIN" build/CarReceiver.bin

      - name: Create/Update GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          files: build/CarReceiver.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}