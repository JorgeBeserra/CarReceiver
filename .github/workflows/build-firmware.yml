name: Build firmware (CarReceiver ESP32)

on:
  push:
    branches: [main]
    paths:
      - 'CarReceiver.ino'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core (PINNED 2.x)
        run: |
          arduino-cli config init
          arduino-cli core update-index
          # 👇 ajuste aqui pra bater com seu Arduino IDE local
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install Bluepad32 library (ESP32 version)
        run: |
          mkdir -p libraries
          rm -rf libraries/Bluepad32
          # 👇 Esta é a lib usada no ESP32/Arduino (mesma linha do seu "Arduino v4.1.0")
          git clone --depth 1 --branch v4.1.0 https://github.com/ricardoquesada/bluepad32-arduino.git libraries/Bluepad32
          echo "Procurando Bluepad32.h:"
          find libraries/Bluepad32 -type f -name "Bluepad32.h" -print

      - name: Extract firmware version
        id: version
        run: |
          VERSION=$(grep -Po '(?<=#define FIRMWARE_VERSION ")[^"]*' CarReceiver.ino | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "ERRO: não achei #define FIRMWARE_VERSION em CarReceiver.ino"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --export-binaries \
            --output-dir build \
            .

          BIN=$(ls -1 build/*.bin | head -n 1)
          echo "BIN gerado: $BIN"
          cp "$BIN" build/CarReceiver.bin

      - name: Create Git Tag (if needed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch --tags
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create/Update GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          files: build/CarReceiver.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}